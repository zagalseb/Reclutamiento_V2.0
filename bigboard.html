<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Big Board — Reclutamiento MTY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>

    body { font-family: 'DM Sans', sans-serif; }

    /* ── Dark page wrapper ── */
    .bb-page {
      background: #0d0f14;
      min-height: calc(100vh - 120px);
      padding: 24px 24px 56px;
    }

    /* ── Title row ── */
    .bb-title-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }
    .bb-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 3px;
      color: #fff;
      margin: 0;
      line-height: 1;
    }
    .bb-badge {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: #7a8a9a;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Board ── */
    .bb-board {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      align-items: flex-start;
      padding-bottom: 14px;
    }
    .bb-board::-webkit-scrollbar { height: 5px; }
    .bb-board::-webkit-scrollbar-track { background: #1a1d25; border-radius: 3px; }
    .bb-board::-webkit-scrollbar-thumb { background: #2e3348; border-radius: 3px; }

    /* ── Column ── */
    .bb-col {
      min-width: 196px;
      width: 196px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .bb-col-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 13px;
      border-radius: 8px 8px 0 0;
    }
    .bb-col-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }
    .bb-col-count {
      background: rgba(0,0,0,.32);
      color: rgba(255,255,255,.85);
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .bb-col-body {
      background: #13161e;
      border-radius: 0 0 8px 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 80px;
    }

    /* ── Card ── */
    .bb-card {
      display: flex;
      flex-direction: column;
      gap: 7px;
      background: #1c1f2e;
      border-radius: 8px;
      padding: 11px 12px;
      border-left: 3px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.14s, transform 0.12s, box-shadow 0.14s;
    }
    .bb-card:hover {
      background: #22263a;
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,0,0,.5);
    }

    /* Avatar + name row */
    .bb-avatar-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .bb-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .bb-avatar-ini {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      color: rgba(255,255,255,.9);
      flex-shrink: 0;
    }
    .bb-name-block {}
    .bb-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.8px;
      color: #e8edf5;
      line-height: 1.15;
    }
    .bb-pos-clase {
      font-size: 10px;
      font-weight: 600;
      color: #5a6a7a;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 1px;
    }

    /* Location */
    .bb-location {
      font-size: 11px;
      color: #454e60;
      line-height: 1.3;
    }

    /* Stars */
    .bb-stars { font-size: 12px; letter-spacing: -0.5px; }
    .bb-stars .s-on  { color: #ffd700; }
    .bb-stars .s-off { color: #242838; }

    /* Footer link */
    .bb-card-footer {
      display: flex;
      justify-content: flex-end;
    }
    .bb-profile-lnk {
      font-size: 10px;
      font-weight: 700;
      color: #3a4255;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.12s;
    }
    .bb-card:hover .bb-profile-lnk { color: #a0b0c8; }

    /* ── Skeleton ── */
    .bb-skel-col {
      min-width: 196px;
      width: 196px;
      flex-shrink: 0;
    }
    .skel-hd {
      height: 40px;
      border-radius: 8px 8px 0 0;
      background: #1c1f2e;
    }
    .skel-bd {
      background: #13161e;
      border-radius: 0 0 8px 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .skel-card {
      border-radius: 8px;
      background: #1c1f2e;
      animation: bb-pulse 1.5s ease-in-out infinite;
    }
    .skel-card:nth-child(1) { height: 86px; }
    .skel-card:nth-child(2) { height: 86px; animation-delay: .18s; }
    .skel-card:nth-child(3) { height: 86px; animation-delay: .36s; }
    @keyframes bb-pulse {
      0%, 100% { opacity: .35; }
      50%       { opacity: .7; }
    }

    /* ── Empty state ── */
    .bb-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 24px;
      width: 100%;
    }
    .bb-empty-icon { font-size: 60px; opacity: .25; margin-bottom: 18px; }
    .bb-empty h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      color: #2a3040;
      margin: 0 0 8px;
    }
    .bb-empty p { font-size: 13px; color: #1e2434; margin: 0; }

    /* ── Footer dark override ── */
    footer { background: #0d0f14; border-top: 1px solid #181b24; }
    footer p { color: #252c3a; }

  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>Reclutamiento</h1>
      <p id="bienvenida"></p>
      <button id="cerrar-sesion">Cerrar sesión</button>
    </div>
    <nav>
      <a href="index.html"       class="nav-link">Inicio</a>
      <a href="prospectos.html"  class="nav-link">Prospectos</a>
      <a href="bigboard.html"    class="nav-link active">Big Board</a>
      <a href="roster.html"      class="nav-link">Roster</a>
      <a href="procesos.html"    class="nav-link">Procesos</a>
      <a href="tareas.html"      class="nav-link">Tareas</a>
    </nav>
  </header>

  <div class="bb-page">

    <div class="bb-title-row">
      <h1 class="bb-title">Big Board</h1>
      <span class="bb-badge" id="bb-total">Cargando...</span>
    </div>

    <div class="bb-board" id="bb-board">
      <!-- Skeleton while loading -->
      <div class="bb-skel-col">
        <div class="skel-hd"></div>
        <div class="skel-bd">
          <div class="skel-card"></div>
          <div class="skel-card"></div>
          <div class="skel-card"></div>
        </div>
      </div>
      <div class="bb-skel-col">
        <div class="skel-hd"></div>
        <div class="skel-bd">
          <div class="skel-card"></div>
          <div class="skel-card"></div>
        </div>
      </div>
      <div class="bb-skel-col">
        <div class="skel-hd"></div>
        <div class="skel-bd">
          <div class="skel-card"></div>
          <div class="skel-card"></div>
          <div class="skel-card"></div>
        </div>
      </div>
      <div class="bb-skel-col">
        <div class="skel-hd"></div>
        <div class="skel-bd">
          <div class="skel-card"></div>
        </div>
      </div>
      <div class="bb-skel-col">
        <div class="skel-hd"></div>
        <div class="skel-bd">
          <div class="skel-card"></div>
          <div class="skel-card"></div>
        </div>
      </div>
    </div>

  </div>

  <footer>
    <p>&copy; 2025 Reclutamiento MTY — Uso interno</p>
  </footer>

  <script>
    const u  = localStorage.getItem("usuarioActual") || "";
    const bv = document.getElementById("bienvenida");
    if (bv && u) bv.textContent = u;
  </script>
  <script src="config.js"></script>
  <script src="bigboard.js"></script>

</body>
</html>
