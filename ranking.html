<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ranking de Jugadores</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      text-align: center;
      color: rgb(0, 0, 0);
    }
    /* header: usa estilo global de style.css */
    h1 {
      margin-top: 20px;
    }
    h2 {
      margin-top: 20px;
      color: #444;
    }
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    thead tr {
      background-color: #444;
      color: #fff;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }
    th {
      font-weight: 600;
    }
    .rank-cell {
      width: 50px;
      font-weight: bold;
    }
    /* Para el Player con foto y nombre */
    .player-flex {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-start;
    }
    .player-photo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ccc;
    }
    .player-name {
      font-weight: bold;
      font-size: 1.0em;
      text-align: left;
    }
    .player-subinfo {
      font-size: 0.85em;
      color: #666;
      text-align: left;
    }
    .pos-label {
      background-color: #eee;
      padding: 5px 10px;
      border-radius: 5px;
      font-weight: bold;
    }
    .team-cell {
      font-style: italic;
      color: #555;
    }

    .player-team-current {
      font-size: 0.85em;
      color: #666;
      text-align: left;
    }


    .team-logo {
      width: 45px;
      height: 40px;
      margin-right: 5px;
      vertical-align: middle;
    }
    .team-cell {
      display: flex;
      align-items: center;
    }
    .team-name {
      font-size: 0.9em;
      font-weight: bold;
    }


    @media (max-width: 600px) {
      table {
        width: 100%;
      }
      th, td {
        font-size: 0.8em;
        padding: 8px;
      }
      .player-photo {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>Reclutamiento</h1>
      <button id="cerrar-sesion">Cerrar sesión</button>
    </div>
    <nav>
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="graficas.html" class="nav-link">Gráficas</a>
      <a href="comparador.html" class="nav-link">Comparador</a>
      <a href="bigboard.html" class="nav-link">Big Board</a>
      <a href="roster.html" class="nav-link">Roster</a>
      <a href="procesos.html" class="nav-link">Procesos</a>
      <a href="tareas.html" class="nav-link">Tareas</a>
    </nav>
  </header>

  <h2>Ranking de Jugadores</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Player</th>
        <th>Pos</th>
        <th>Ht / Wt</th>
        <th>Rating</th>
        <th>Comprometido</th>
      </tr>
    </thead>
    <tbody id="playersTableBody">
      <!-- Se llenará dinámicamente con ranking.js -->
    </tbody>
  </table>

  <script src="ranking.js"></script>
</body>
</html>
