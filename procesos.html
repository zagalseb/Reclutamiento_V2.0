<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Procesos — Reclutamiento MTY</title>
  <link rel="stylesheet" href="style.css">
  <style>

    .procesos-main {
      max-width: 100%;
      padding: 20px 24px 48px;
    }

    /* ── Stats ── */
    .crm-stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .crm-stat {
      background: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      flex: 1;
      min-width: 70px;
      box-shadow: 0 2px 8px rgba(0,72,146,.07);
    }
    .crm-stat .num {
      font-size: 22px;
      font-weight: 800;
      color: #004892;
      line-height: 1;
    }
    .crm-stat .lbl {
      font-size: 10px;
      color: #8a9ab0;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-top: 3px;
    }

    /* ── Toolbar ── */
    .crm-toolbar {
      background: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,72,146,.06);
    }
    .toolbar-filters {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      flex: 1;
    }
    .tf-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 140px;
    }
    .tf-item label {
      font-size: 10px;
      font-weight: 700;
      color: #004892;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .tf-item input,
    .tf-item select {
      padding: 7px 10px;
      border: 1px solid #c8d4e3;
      border-radius: 6px;
      font-size: 13px;
      background: #f8fafc;
      color: #1a2a3a;
      width: 100%;
      box-sizing: border-box;
    }
    .tf-item input:focus,
    .tf-item select:focus {
      outline: none;
      border-color: #004892;
      box-shadow: 0 0 0 3px rgba(0,72,146,.12);
    }
    .btn-clear {
      padding: 7px 14px;
      background: #fff;
      border: 1.5px solid #c8d4e3;
      color: #5a6a7a;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      transition: all .15s;
    }
    .btn-clear:hover { border-color: #004892; color: #004892; }
    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .crm-meta {
      font-size: 12px;
      color: #8a9ab0;
      white-space: nowrap;
    }
    .btn-add {
      padding: 8px 18px;
      background: #004892;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-add:hover { background: #003570; }

    /* ── Top scrollbar ── */
    .board-top-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      height: 10px;
      margin-bottom: 4px;
    }
    .board-top-scroll::-webkit-scrollbar { height: 6px; }
    .board-top-scroll::-webkit-scrollbar-track { background: #e8eef5; border-radius: 3px; }
    .board-top-scroll::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }
    #board-top-inner { height: 1px; }

    /* ── Board ── */
    .board {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      align-items: flex-start;
      padding-bottom: 20px;
      scroll-behavior: smooth;
    }
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: #e8eef5; border-radius: 3px; }
    .board::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }

    /* ── Column ── */
    .col {
      min-width: 210px;
      width: 210px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .col-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      border-radius: 8px 8px 0 0;
      color: #fff;
    }
    .col-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .col-count {
      background: rgba(255,255,255,.25);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 800;
    }
    .col-body {
      background: #e8eef5;
      border-radius: 0 0 8px 8px;
      padding: 8px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: background .15s;
    }
    .col-body.drag-over {
      background: #cfdcee;
      outline: 2px dashed #004892;
      outline-offset: -2px;
    }

    /* ── Card ── */
    .kanban-card {
      background: #fff;
      border-radius: 8px;
      padding: 11px 13px;
      box-shadow: 0 1px 4px rgba(0,72,146,.09);
      cursor: pointer;
      transition: box-shadow .15s, transform .1s;
      user-select: none;
      border-left: 3px solid transparent;
    }
    .kanban-card:hover {
      box-shadow: 0 4px 14px rgba(0,72,146,.17);
      transform: translateY(-1px);
    }
    .kanban-card.dragging {
      opacity: .45;
      transform: scale(.97);
    }
    .card-name {
      font-size: 13px;
      font-weight: 700;
      color: #1a2a3a;
      margin-bottom: 5px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
    }
    .card-stars { color: #e0c000; font-size: 11px; letter-spacing: -1px; }
    .stars-off   { color: #d0d8e0; }
    .card-pos {
      font-size: 10px;
      font-weight: 800;
      background: rgba(0,72,146,.1);
      color: #004892;
      padding: 1px 6px;
      border-radius: 4px;
      letter-spacing: .2px;
    }
    .card-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .badge-pri {
      width: 22px; height: 22px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 12px;
      flex-shrink: 0;
    }
    .badge-pri.A { background: rgba(0,72,146,.13); color: #004892; }
    .badge-pri.B { background: rgba(0,0,0,.08);   color: #444; }
    .badge-pri.C { background: rgba(139,0,0,.1);  color: #8B0000; }
    .card-decision {
      font-size: 11px;
      font-weight: 600;
    }
    .card-next {
      font-size: 11px;
      color: #5a6a7a;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-box {
      background: #fff;
      border-radius: 12px;
      width: min(560px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.25);
      display: flex;
      flex-direction: column;
    }
    .modal-box-sm { width: min(420px, 100%); }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 14px;
      border-bottom: 1px solid #edf2f7;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 16px;
      color: #004892;
      font-weight: 800;
    }
    .modal-close-btn {
      background: none;
      border: none;
      font-size: 18px;
      color: #8a9ab0;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color .15s, background .15s;
      line-height: 1;
    }
    .modal-close-btn:hover { background: #f0f4f8; color: #1a2a3a; }
    .modal-body {
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 130px;
    }
    .modal-field.full { flex: none; width: 100%; }
    .modal-field label {
      font-size: 10px;
      font-weight: 700;
      color: #004892;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .modal-select,
    .modal-input {
      padding: 8px 10px;
      border: 1.5px solid #c8d4e3;
      border-radius: 6px;
      font-size: 13px;
      background: #f8fafc;
      color: #1a2a3a;
      width: 100%;
      box-sizing: border-box;
    }
    .modal-select:focus,
    .modal-input:focus {
      outline: none;
      border-color: #004892;
      box-shadow: 0 0 0 3px rgba(0,72,146,.12);
      background: #fff;
    }
    .modal-textarea {
      padding: 9px 10px;
      border: 1.5px solid #c8d4e3;
      border-radius: 6px;
      font-size: 13px;
      background: #f8fafc;
      color: #1a2a3a;
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .modal-textarea:focus {
      outline: none;
      border-color: #004892;
      box-shadow: 0 0 0 3px rgba(0,72,146,.12);
      background: #fff;
    }
    .modal-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px 18px;
      border-top: 1px solid #edf2f7;
      flex-wrap: wrap;
    }
    .btn-save {
      padding: 9px 20px;
      background: #004892;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-save:hover    { background: #003570; }
    .btn-save:disabled { background: #8ab0d4; cursor: default; }
    .btn-cancel {
      padding: 9px 16px;
      background: #fff;
      border: 1.5px solid #c8d4e3;
      color: #5a6a7a;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel:hover { border-color: #004892; color: #004892; }
    .btn-remove-modal {
      padding: 9px 16px;
      background: #fff;
      border: 1.5px solid rgba(139,0,0,.35);
      color: #8B0000;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-remove-modal:hover { background: #8B0000; color: #fff; border-color: #8B0000; }
    .save-msg { font-size: 13px; font-weight: 600; }
    .save-msg.ok  { color: #0a5038; }
    .save-msg.err { color: #842029; }

    /* ── Add player results ── */
    .add-results {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #e0e8f0;
      border-radius: 7px;
      background: #f8fafc;
    }
    .add-hint {
      text-align: center;
      padding: 20px;
      color: #8a9ab0;
      font-size: 13px;
      margin: 0;
    }
    .add-result-item {
      padding: 10px 14px;
      border-bottom: 1px solid #edf2f7;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #1a2a3a;
      transition: background .12s;
    }
    .add-result-item:last-child { border-bottom: none; }
    .add-result-item:hover { background: #eef4fb; }
    .add-msg {
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
      min-height: 18px;
    }

    /* ── Loading / empty ── */
    .board-loading {
      padding: 60px 40px;
      color: #8a9ab0;
      text-align: center;
      width: 100%;
    }
    .board-loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e8f0;
      border-top-color: #004892;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .col-empty {
      text-align: center;
      padding: 16px 8px;
      color: #b0bec8;
      font-size: 11px;
      font-style: italic;
    }

  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>Reclutamiento</h1>
      <p id="bienvenida"></p>
      <button id="cerrar-sesion">Cerrar sesión</button>
    </div>
    <nav>
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="prospectos.html" class="nav-link">Prospectos</a>
      <a href="bigboard.html" class="nav-link">Big Board</a>
      <a href="roster.html" class="nav-link">Roster</a>
      <a href="procesos.html" class="nav-link active">Procesos</a>
      <a href="tareas.html" class="nav-link">Tareas</a>
    </nav>
  </header>

  <main class="procesos-main">

    <!-- Stats -->
    <div class="crm-stats">
      <div class="crm-stat"><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
      <div class="crm-stat"><div class="num" id="s-nuevo">0</div><div class="lbl">Nuevo</div></div>
      <div class="crm-stat"><div class="num" id="s-evaluado">0</div><div class="lbl">Evaluado</div></div>
      <div class="crm-stat"><div class="num" id="s-contactado">0</div><div class="lbl">Contactado</div></div>
      <div class="crm-stat"><div class="num" id="s-tryout-visita">0</div><div class="lbl">Tryout</div></div>
      <div class="crm-stat"><div class="num" id="s-oferta">0</div><div class="lbl">Oferta</div></div>
      <div class="crm-stat"><div class="num" id="s-admitido">0</div><div class="lbl">Admitido</div></div>
      <div class="crm-stat"><div class="num" id="s-no-interesado">0</div><div class="lbl">No inter.</div></div>
    </div>

    <!-- Toolbar -->
    <div class="crm-toolbar">
      <div class="toolbar-filters">
        <div class="tf-item">
          <label for="f-search">Buscar</label>
          <input type="text" id="f-search" placeholder="Nombre del jugador...">
        </div>
        <div class="tf-item" style="min-width:110px;">
          <label for="f-prioridad">Prioridad</label>
          <select id="f-prioridad">
            <option value="">Todas</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
          </select>
        </div>
        <div class="tf-item" style="min-width:150px;">
          <label for="f-decision">Decisión</label>
          <select id="f-decision">
            <option value="">Todas</option>
            <option>Pendiente</option>
            <option>Oferta</option>
            <option>Seguimiento</option>
            <option>Admitido</option>
            <option>No interesado</option>
          </select>
        </div>
        <div class="tf-item" style="min-width:110px;">
          <label for="f-posicion">Posición</label>
          <select id="f-posicion">
            <option value="">Todas</option>
            <option>QB</option><option>RB</option><option>FB</option>
            <option>WR</option><option>TE</option><option>OT</option>
            <option>OG</option><option>C</option><option>DE</option>
            <option>DT</option><option>LB</option><option>CB</option>
            <option>S</option><option>K</option><option>P</option>
          </select>
        </div>
        <button class="btn-clear" id="btn-clear">✕ Limpiar</button>
      </div>
      <div class="toolbar-actions">
        <span class="crm-meta" id="crm-meta"></span>
        <button class="btn-add" id="btn-add">+ Agregar jugador</button>
      </div>
    </div>

    <!-- Top scrollbar sync -->
    <div id="board-top-scroll" class="board-top-scroll">
      <div id="board-top-inner"></div>
    </div>

    <!-- Kanban board -->
    <div id="board" class="board">
      <div class="board-loading">
        <div class="spinner"></div>
        <p>Cargando procesos...</p>
      </div>
    </div>

  </main>

  <!-- ── Edit modal ── -->
  <div id="modal-edit" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="m-title">—</h3>
        <button id="m-close" class="modal-close-btn" title="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-row">
          <div class="modal-field">
            <label>Etapa</label>
            <select id="m-etapa" class="modal-select">
              <option>Nuevo</option>
              <option>Evaluado</option>
              <option>Contactado</option>
              <option>Tryout / Visita</option>
              <option>Oferta</option>
              <option>Admitido</option>
              <option>No interesado</option>
            </select>
          </div>
          <div class="modal-field">
            <label>Decisión</label>
            <select id="m-decision" class="modal-select">
              <option>Pendiente</option>
              <option>Oferta</option>
              <option>Seguimiento</option>
              <option>Admitido</option>
              <option>No interesado</option>
            </select>
          </div>
          <div class="modal-field" style="max-width:100px;">
            <label>Prioridad</label>
            <select id="m-prioridad" class="modal-select">
              <option>A</option>
              <option>B</option>
              <option>C</option>
            </select>
          </div>
        </div>
        <div class="modal-field full">
          <label>Siguiente paso</label>
          <input type="text" id="m-siguiente" class="modal-input" placeholder="¿Qué hay que hacer?">
        </div>
        <div class="modal-field full">
          <label>Detalles</label>
          <textarea id="m-detalles" class="modal-textarea" placeholder="Notas de contacto, seguimiento, observaciones..."></textarea>
        </div>
        <div class="modal-field full">
          <label>Scouting Report</label>
          <textarea id="m-scouting" class="modal-textarea" placeholder="Evaluación técnica, física, actitudinal..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="m-save" class="btn-save">Guardar cambios</button>
        <span id="m-save-msg" class="save-msg" style="display:none;"></span>
        <div style="flex:1;"></div>
        <button id="m-remove" class="btn-remove-modal">Quitar del kanban</button>
        <button id="m-cancel" class="btn-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- ── Add player modal ── -->
  <div id="modal-add" class="modal-overlay" style="display:none;">
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3>Agregar jugador al kanban</h3>
        <button id="add-close" class="modal-close-btn" title="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field full">
          <label>Buscar jugador</label>
          <input type="text" id="add-search" class="modal-input" placeholder="Escribe nombre o apellido...">
        </div>
        <div id="add-results" class="add-results">
          <p class="add-hint">Escribe al menos 2 caracteres para buscar.</p>
        </div>
        <div id="add-msg" class="add-msg"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Reclutamiento MTY — Uso interno</p>
  </footer>

  <script>
    const u = localStorage.getItem("usuarioActual") || "";
    const bv = document.getElementById("bienvenida");
    if (bv && u) bv.textContent = u;
  </script>
  <script src="config.js"></script>
  <script src="procesos.js"></script>

</body>
</html>
