<!DOCTYPE html>
<html lang="es">
<script>
  if (!localStorage.getItem("sesionIniciada")) {
    window.location.href = "login.html";
  }
</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Reclutamiento MTY</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>Reclutamiento</h1>
      <p id="bienvenida"></p>
      <button id="cerrar-sesion">Cerrar sesión</button>
    </div>
    <nav>
      <a href="index.html" class="nav-link active">Inicio</a>
      <a href="prospectos.html" class="nav-link">Prospectos</a>
      <a href="bigboard.html" class="nav-link">Big Board</a>
      <a href="roster.html" class="nav-link">Roster</a>
      <a href="procesos.html" class="nav-link">Procesos</a>
      <a href="tareas.html" class="nav-link">Tareas</a>
    </nav>
  </header>

  <!-- Filtros -->
  <section id="filtros">
    <div class="filtros-grid">

      <div class="filtro-item">
        <label for="posicionOfensivaFiltro">Posición</label>
        <select id="posicionOfensivaFiltro" onchange="filtrarPorPosicionOfensiva()">
          <option value="">Todas</option>
          <option value="QB">QB</option>
          <option value="RB">RB</option>
          <option value="FB">FB</option>
          <option value="WR">WR</option>
          <option value="TE">TE</option>
          <option value="OT">OT</option>
          <option value="OG">OG</option>
          <option value="C">C</option>
          <option value="DL">DL</option>
          <option value="LB">LB</option>
          <option value="CB">CB</option>
          <option value="S">S</option>
          <option value="Ninguna">Ninguna</option>
        </select>
      </div>

      <div class="filtro-item">
        <label for="claseFiltro">Clase</label>
        <select id="claseFiltro" onchange="filtrarPorClase()">
          <option value="">Todos</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="all">2025 · 2026 · 2027</option>
        </select>
      </div>

      <div class="filtro-item">
        <label for="favoritosFiltro">Favoritos</label>
        <select id="favoritosFiltro" onchange="filtrarPorFavoritos()">
          <option value="todos">Todos</option>
          <option value="favoritos">Solo Favoritos</option>
        </select>
      </div>

      <div class="filtro-item">
        <label for="estadoFiltro">Estado</label>
        <select id="estadoFiltro" onchange="filtrarPorEstado()">
          <option value="Todos">Todos</option>
          <option value="Aguascalientes">Aguascalientes</option>
          <option value="Baja California">Baja California</option>
          <option value="Baja California Sur">Baja California Sur</option>
          <option value="Campeche">Campeche</option>
          <option value="Chiapas">Chiapas</option>
          <option value="Chihuahua">Chihuahua</option>
          <option value="Ciudad de México">Ciudad de México</option>
          <option value="Coahuila">Coahuila</option>
          <option value="Colima">Colima</option>
          <option value="Durango">Durango</option>
          <option value="Estado de México">Estado de México</option>
          <option value="Guanajuato">Guanajuato</option>
          <option value="Guerrero">Guerrero</option>
          <option value="Hidalgo">Hidalgo</option>
          <option value="Jalisco">Jalisco</option>
          <option value="Michoacán">Michoacán</option>
          <option value="Morelos">Morelos</option>
          <option value="Nayarit">Nayarit</option>
          <option value="Nuevo León">Nuevo León</option>
          <option value="Oaxaca">Oaxaca</option>
          <option value="Puebla">Puebla</option>
          <option value="Querétaro">Querétaro</option>
          <option value="Quintana Roo">Quintana Roo</option>
          <option value="San Luis Potosí">San Luis Potosí</option>
          <option value="Sinaloa">Sinaloa</option>
          <option value="Sonora">Sonora</option>
          <option value="Tabasco">Tabasco</option>
          <option value="Tamaulipas">Tamaulipas</option>
          <option value="Tlaxcala">Tlaxcala</option>
          <option value="Veracruz">Veracruz</option>
          <option value="Yucatán">Yucatán</option>
          <option value="Zacatecas">Zacatecas</option>
        </select>
      </div>

      <div class="filtro-item">
        <label for="alturaMinFiltro">Altura mín.</label>
        <input type="number" id="alturaMinFiltro" oninput="filtrarPorAltura()" placeholder="1.70">
      </div>

      <div class="filtro-item">
        <label for="alturaMaxFiltro">Altura máx.</label>
        <input type="number" id="alturaMaxFiltro" oninput="filtrarPorAltura()" placeholder="2.05">
      </div>

      <div class="filtro-item">
        <label for="buscador-nombre">Buscar prospecto</label>
        <input type="text" id="buscador-nombre" placeholder="Nombre..." oninput="filtrarPorNombre()">
      </div>

      <div class="filtro-item">
        <label for="ordenarFiltro">Ordenar por</label>
        <select id="ordenarFiltro" onchange="ordenarResultados()">
          <option value="">Sin orden</option>
          <option value="nombre-az">Nombre A–Z</option>
          <option value="nombre-za">Nombre Z–A</option>
          <option value="altura-desc">Altura ↓</option>
          <option value="altura-asc">Altura ↑</option>
          <option value="rating-desc">Rating ↓</option>
          <option value="clase-asc">Clase ↑</option>
        </select>
      </div>

      <div class="filtro-item filtro-accion">
        <button onclick="resetearFiltros()" class="btn-limpiar">✕ Limpiar</button>
      </div>

    </div>
  </section>

  <!-- Resultados -->
  <main>
    <section id="resultados-container">
      <div class="resultados-header">
        <h2 id="resultados-titulo">Resultados</h2>
        <div id="stats-bar">
          <span id="stat-total"></span>
          <span id="stat-favoritos"></span>
          <span id="stat-proceso"></span>
          <button onclick="exportarCSV()" class="btn-exportar">⬇ Exportar CSV</button>
        </div>
      </div>
      <ul id="resultados"></ul>
      <ul id="lista-jugadores"></ul>
      <div id="paginacion"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Reclutamiento MTY — Uso interno</p>
  </footer>

</body>
</html>
